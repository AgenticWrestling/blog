<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <style>
    .actor-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 16px; fill: #1e293b; }
    .lifeline { stroke: #e2e8f0; stroke-width: 2; stroke-dasharray: 4,4; }
    .msg-line { stroke: #475569; stroke-width: 2; fill: none; }
    .msg-text { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #1e293b; font-weight: 500; }
    .layer-note { fill: #fef9c3; stroke: #fde047; stroke-width: 1; filter: url(#shadow); }
    .layer-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 14px; fill: #854d0e; }
    .robot-body { fill: #8b5cf6; }
    .robot-head { fill: #a78bfa; }
    .robot-eye { fill: white; }
  </style>

  <!-- Agent Alpha (Left) -->
  <g transform="translate(80, 20)">
    <rect class="robot-body" x="0" y="15" width="40" height="35" rx="6" />
    <rect class="robot-head" x="5" y="0" width="30" height="20" rx="4" />
    <circle class="robot-eye" cx="13" cy="8" r="2.5" />
    <circle class="robot-eye" cx="27" cy="8" r="2.5" />
    <line stroke="#475569" x1="20" y1="0" x2="20" y2="-5" stroke-width="2" />
    <circle fill="#f43f5e" cx="20" cy="-7" r="2" />
  </g>
  <text x="100" y="85" text-anchor="middle" class="actor-text">Agent Alpha</text>

  <!-- Agent Beta (Right) -->
  <g transform="translate(480, 20)">
    <rect class="robot-body" x="0" y="15" width="40" height="35" rx="6" />
    <rect class="robot-head" x="5" y="0" width="30" height="20" rx="4" />
    <circle class="robot-eye" cx="13" cy="8" r="2.5" />
    <circle class="robot-eye" cx="27" cy="8" r="2.5" />
    <line stroke="#475569" x1="20" y1="0" x2="20" y2="-5" stroke-width="2" />
    <circle fill="#f43f5e" cx="20" cy="-7" r="2" />
  </g>
  <text x="500" y="85" text-anchor="middle" class="actor-text">Agent Beta</text>

  <!-- Lifelines -->
  <line class="lifeline" x1="100" y1="100" x2="100" y2="720" />
  <line class="lifeline" x1="500" y1="100" x2="500" y2="720" />

  <!-- Layer 11 -->
  <rect class="layer-note" x="200" y="120" width="200" height="30" rx="4" />
  <text x="300" y="140" text-anchor="middle" class="layer-text">LAYER 11: PURPOSE</text>
  <line class="msg-line" x1="100" y1="170" x2="490" y2="170" marker-end="url(#arrowhead)" />
  <text x="300" y="165" text-anchor="middle" class="msg-text">Propose Goal (Utility Check)</text>
  <line class="msg-line" x1="500" y1="210" x2="110" y2="210" marker-end="url(#arrowhead)" stroke-dasharray="4,2" />
  <text x="300" y="205" text-anchor="middle" class="msg-text">Validate Strategic Compatibility</text>

  <!-- Layer 10 -->
  <rect class="layer-note" x="200" y="260" width="200" height="30" rx="4" />
  <text x="300" y="280" text-anchor="middle" class="layer-text">LAYER 10: GOVERNANCE</text>
  <line class="msg-line" x1="100" y1="310" x2="490" y2="310" marker-end="url(#arrowhead)" />
  <text x="300" y="305" text-anchor="middle" class="msg-text">Fiduciary/Safety Constraints</text>
  <line class="msg-line" x1="500" y1="350" x2="110" y2="350" marker-end="url(#arrowhead)" stroke-dasharray="4,2" />
  <text x="300" y="345" text-anchor="middle" class="msg-text">Confirm Compliance Guardrails</text>

  <!-- Layer 9 -->
  <rect class="layer-note" x="200" y="400" width="200" height="30" rx="4" />
  <text x="300" y="420" text-anchor="middle" class="layer-text">LAYER 9: GROUNDING</text>
  <line class="msg-line" x1="100" y1="450" x2="490" y2="450" marker-end="url(#arrowhead)" />
  <text x="300" y="445" text-anchor="middle" class="msg-text">Definition of Terms (Taxonomy)</text>
  <line class="msg-line" x1="500" y1="490" x2="110" y2="490" marker-end="url(#arrowhead)" stroke-dasharray="4,2" />
  <text x="300" y="485" text-anchor="middle" class="msg-text">Grounding Acknowledged</text>

  <!-- Layer 8 -->
  <rect class="layer-note" x="200" y="540" width="200" height="30" rx="4" />
  <text x="300" y="560" text-anchor="middle" class="layer-text">LAYER 8: COHERENCE</text>
  <line class="msg-line" x1="100" y1="590" x2="490" y2="590" marker-end="url(#arrowhead)" />
  <text x="300" y="585" text-anchor="middle" class="msg-text">Logical State Sync</text>
  <line class="msg-line" x1="500" y1="630" x2="110" y2="630" marker-end="url(#arrowhead)" stroke-dasharray="4,2" />
  <text x="300" y="625" text-anchor="middle" class="msg-text">Handshake Complete</text>

  <!-- Transition -->
  <rect fill="#f1f5f9" x="150" y="680" width="300" height="40" rx="20" />
  <text x="300" y="705" text-anchor="middle" class="actor-text" style="font-size: 14px;">STANDARD OSI LAYERS (7-1) BEGIN</text>

</svg>